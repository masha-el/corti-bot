version: "3.8"

services:
  corti:
    build: .
    container_name: corti
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./credentials:/app/credentials:ro
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"